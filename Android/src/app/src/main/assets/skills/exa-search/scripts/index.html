<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exa Search</title>
  </head>
  <body>
    <script>
      const API_URL = "https://api.exa.ai/search";
      const ALLOWED_TOPICS = new Set(["general", "news", "finance"]);
      const ALLOWED_SEARCH_TYPES = new Set(["auto", "instant", "fast", "deep"]);
      const ALLOWED_DETAIL_MODES = new Set(["summary", "light", "standard", "full"]);
      const ALLOWED_RESULT_COUNTS = [1, 3, 5, 8];
      const ALLOWED_TIME_RANGES = new Set(["day", "week", "month", "year"]);

      function capText(value, maxChars) {
        if (!value) return "";
        const normalized = String(value).replace(/\s+\n/g, "\n").replace(/\n{3,}/g, "\n\n").trim();
        if (normalized.length <= maxChars) return normalized;
        return normalized.slice(0, maxChars) + "\n...[TRUNCATED]";
      }

      function parseJsonSafe(value) {
        try {
          return JSON.parse(value || "{}");
        } catch (error) {
          return {};
        }
      }

      function clampResultCount(value) {
        const num = Number(value);
        if (ALLOWED_RESULT_COUNTS.includes(num)) return num;
        if (!Number.isFinite(num) || num <= 1) return 1;
        if (num <= 3) return 3;
        if (num <= 5) return 5;
        return 8;
      }

      function normalizeArray(value) {
        if (!Array.isArray(value)) return [];
        return value.map((item) => String(item || "").trim()).filter(Boolean);
      }

      function toIsoAfter(range) {
        if (!ALLOWED_TIME_RANGES.has(range)) return null;
        const now = Date.now();
        const offsets = {
          day: 1,
          week: 7,
          month: 30,
          year: 365,
        };
        return new Date(now - offsets[range] * 24 * 60 * 60 * 1000).toISOString();
      }

      function normalizeParams(rawData, rawConfig) {
        const topicFromConfig = rawConfig.topic_mode;
        const topicFromData = rawData.topic;
        const topic =
          ALLOWED_TOPICS.has(topicFromConfig) ? topicFromConfig : ALLOWED_TOPICS.has(topicFromData) ? topicFromData : "general";
        const searchType =
          ALLOWED_SEARCH_TYPES.has(rawConfig.search_type_mode) ? rawConfig.search_type_mode : ALLOWED_SEARCH_TYPES.has(rawData.search_type) ? rawData.search_type : "auto";
        const detailMode =
          ALLOWED_DETAIL_MODES.has(rawConfig.detail_mode) ? rawConfig.detail_mode : ALLOWED_DETAIL_MODES.has(rawData.detail_mode) ? rawData.detail_mode : "summary";
        const resultCount = clampResultCount(rawConfig.result_count || rawData.max_results || 3);
        const timeMode = ALLOWED_TIME_RANGES.has(rawConfig.time_mode) ? rawConfig.time_mode : ALLOWED_TIME_RANGES.has(rawData.time_range) ? rawData.time_range : null;
        return {
          query: String(rawData.query || "").trim(),
          topic,
          searchType,
          detailMode,
          resultCount,
          startPublishedDate: toIsoAfter(timeMode),
          includeDomains: normalizeArray(rawData.include_domains),
          excludeDomains: normalizeArray(rawData.exclude_domains),
        };
      }

      function buildContents(params) {
        if (params.detailMode === "summary") {
          return { summary: { query: params.query } };
        }
        if (params.detailMode === "light") {
          return { highlights: { query: params.query, numSentences: 2, highlightsPerUrl: 2 } };
        }
        if (params.detailMode === "standard") {
          return {
            summary: { query: params.query },
            highlights: { query: params.query, numSentences: 3, highlightsPerUrl: 3 },
          };
        }
        return {
          summary: { query: params.query },
          text: true,
          highlights: { query: params.query, numSentences: 4, highlightsPerUrl: 4 },
        };
      }

      function buildRequestBody(params) {
        const body = {
          query: params.query,
          type: params.searchType,
          numResults: params.resultCount,
          contents: buildContents(params),
        };

        if (params.topic === "news") {
          body.category = "news";
        } else if (params.topic === "finance") {
          body.category = "financial report";
        }
        if (params.startPublishedDate) {
          body.startPublishedDate = params.startPublishedDate;
        }
        if (params.includeDomains.length > 0) {
          body.includeDomains = params.includeDomains;
        }
        if (params.excludeDomains.length > 0 && !["company", "people"].includes(body.category)) {
          body.excludeDomains = params.excludeDomains;
        }
        return body;
      }

      function formatResultBlock(result, index, params) {
        const parts = [];
        parts.push(`[${index + 1}] ${capText(result.title || "Untitled", 160)}`);
        if (result.url) parts.push(`URL: ${result.url}`);
        if (result.publishedDate) parts.push(`Published: ${result.publishedDate}`);
        if (result.author) parts.push(`Author: ${capText(result.author, 160)}`);

        const textLimitByMode = {
          summary: 0,
          light: 0,
          standard: 0,
          full: 2200,
        };

        if (result.summary) {
          parts.push(`Summary: ${capText(result.summary, params.detailMode === "summary" ? 600 : 1200)}`);
        }
        if (Array.isArray(result.highlights) && result.highlights.length > 0) {
          parts.push(`Highlights: ${capText(result.highlights.join(" | "), params.detailMode === "light" ? 900 : 1600)}`);
        }
        if (params.detailMode === "full" && result.text) {
          parts.push(`Text: ${capText(result.text, textLimitByMode[params.detailMode])}`);
        }
        return parts.join("\n");
      }

      function formatResponse(response, params) {
        const lines = [];
        lines.push(`Search query: ${params.query}`);
        lines.push(`Topic: ${params.topic}`);
        lines.push(`Search type: ${params.searchType}`);
        lines.push(`Detail mode: ${params.detailMode}`);
        lines.push(`Max results requested: ${params.resultCount}`);
        if (response.requestId) lines.push(`Request ID: ${response.requestId}`);
        if (response.searchType) lines.push(`Resolved search type: ${response.searchType}`);

        const results = Array.isArray(response.results) ? response.results : [];
        if (results.length > 0) {
          lines.push("");
          lines.push("Sources:");
          results.forEach((result, index) => {
            lines.push(formatResultBlock(result, index, params));
            lines.push("");
          });
        } else {
          lines.push("");
          lines.push("Sources: none");
        }

        if (response.costDollars) {
          lines.push("Usage:");
          lines.push(capText(JSON.stringify(response.costDollars), 500));
        }

        const totalLimitByMode = {
          summary: 3200,
          light: 5600,
          standard: 9600,
          full: 18000,
        };
        return capText(lines.join("\n").trim(), totalLimitByMode[params.detailMode] || 5600);
      }

      async function searchWithExa(data, secret, config) {
        if (!secret || !String(secret).trim()) {
          return { error: "Missing Exa API key. Open the skill list, choose the Exa skill, and set its secret first." };
        }

        const rawData = parseJsonSafe(data);
        const rawConfig = parseJsonSafe(config);
        const params = normalizeParams(rawData, rawConfig);
        if (!params.query) {
          return { error: "No search query was provided." };
        }

        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": String(secret).trim(),
          },
          body: JSON.stringify(buildRequestBody(params)),
        });

        let payload = null;
        try {
          payload = await response.json();
        } catch (error) {
          payload = null;
        }

        if (!response.ok) {
          const errorMessage =
            payload?.error ||
            payload?.detail ||
            payload?.message ||
            `Exa request failed with HTTP ${response.status}.`;
          return { error: errorMessage };
        }

        return { result: formatResponse(payload || {}, params) };
      }

      window["ai_edge_gallery_get_result"] = async (data, secret, config) => {
        try {
          const result = await searchWithExa(data, secret, config);
          return JSON.stringify(result);
        } catch (error) {
          console.error(error);
          return JSON.stringify({ error: `Failed to run Exa search: ${error.message}` });
        }
      };
    </script>
  </body>
</html>

name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "feature/**" ]
    paths:
      - 'Android/**'
      - '.github/workflows/build_android.yaml'
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Android/**'

permissions:
  contents: write

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
      ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v4
      - name: Checkout stable-diffusion.cpp
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          ref: 19bdfe22d255d5b4dff39d449318b9bc5ea2317f
          path: Android/src/app/src/main/cpp/third_party/stable-diffusion.cpp
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Derive branch-aware version channel
        id: channel
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          REF_TYPE="${GITHUB_REF_TYPE}"
          echo "Triggered by ref_name=${REF_NAME} ref_type=${REF_TYPE}"
          IS_PRERELEASE="false"
          if [ "$REF_TYPE" = "tag" ]; then
            RAW_VNAME="${REF_NAME#v}"
            # tag 关键字 → 渠道与包名后缀（保证可与稳定版 com.localagent.plaza 并行安装）
            # 注意：VNAME 的基底必须是已经发布到 google-ai-edge/gallery/model_allowlists 的版本，
            # 因为应用会通过 BuildConfig.VERSION_NAME.substringBefore("-").replace(".", "_") 去拉
            # https://raw.githubusercontent.com/google-ai-edge/gallery/refs/heads/main/model_allowlists/{base}.json
            # 当前可用基底版本上限为 1.0.14（截至 2025-06 校验）。
            ALLOWLIST_BASE="1.0.14"
            case "$REF_NAME" in
              *mcp*)
                CHANNEL="mcp"
                SUFFIX=".mcp"
                VNAME="${ALLOWLIST_BASE}-mcp.${GITHUB_RUN_NUMBER}"
                ;;
              *experimental*)
                CHANNEL="experimental"
                SUFFIX=".experimental"
                VNAME="${ALLOWLIST_BASE}-experimental.${GITHUB_RUN_NUMBER}"
                ;;
              *visual*)
                CHANNEL="visual"
                SUFFIX=""
                VNAME="${RAW_VNAME}"
                ;;
              v1.0.[0-9]*-plaza.[0-9]*|v1.0.[0-9]*|v[0-9]*.[0-9]*.[0-9]*)
                CHANNEL="release"
                SUFFIX=""
                VNAME="${RAW_VNAME}"
                ;;
              *)
                CHANNEL="tag"
                SUFFIX=".dev"
                VNAME="${ALLOWLIST_BASE}-dev.${GITHUB_RUN_NUMBER}"
                ;;
            esac
            # prerelease 判定：含 smoketest/alpha/beta/rc/dev 等关键字
            case "$REF_NAME" in
              *smoketest*|*alpha*|*beta*|*rc*|*dev*|*experimental*)
                IS_PRERELEASE="true"
                ;;
            esac
          else
            BRANCH="${REF_NAME}"
            case "$BRANCH" in
              main)
                VNAME="1.0.13-plaza.main.$GITHUB_RUN_NUMBER"
                CHANNEL="main"
                SUFFIX=""
                ;;
              feature/local-visual-creation)
                VNAME="1.0.13-plaza.visual.$GITHUB_RUN_NUMBER"
                CHANNEL="visual"
                SUFFIX=""
                ;;
              feature/upstream-sync-and-mcp-20260622)
                VNAME="1.0.13-plaza.mcp.$GITHUB_RUN_NUMBER"
                CHANNEL="mcp"
                SUFFIX=".mcp"
                ;;
              feature/*)
                SAFE_VERSION="$(printf '%s' "$BRANCH" | sed 's|^feature/||; s|[^a-zA-Z0-9.-]|-|g; s|^-*||; s|-*$||')"
                SAFE_PACKAGE="$(printf '%s' "$BRANCH" | sed 's|^feature/||; s|[^a-zA-Z0-9_]|_|g; s|^_*||; s|_*$||')"
                [ -n "$SAFE_VERSION" ] || SAFE_VERSION="feature"
                [ -n "$SAFE_PACKAGE" ] || SAFE_PACKAGE="feature"
                VNAME="1.0.13-plaza.${SAFE_VERSION}.$GITHUB_RUN_NUMBER"
                CHANNEL="$SAFE_VERSION"
                SUFFIX=".${SAFE_PACKAGE}"
                ;;
              *)
                VNAME="1.0.13-plaza.dev.$GITHUB_RUN_NUMBER"
                CHANNEL="dev"
                SUFFIX=".dev"
                ;;
            esac
          fi
          echo "LOCAL_VERSION_NAME=$VNAME" >> "$GITHUB_ENV"
          echo "LOCAL_VERSION_CODE=$((100 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "APPLICATION_ID_SUFFIX=$SUFFIX" >> "$GITHUB_ENV"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "vname=$VNAME" >> "$GITHUB_OUTPUT"
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
      - name: Prepare release signing
        run: |
          test -n "$ANDROID_RELEASE_KEYSTORE_BASE64"
          test -n "$ANDROID_RELEASE_KEYSTORE_PASSWORD"
          test -n "$ANDROID_RELEASE_KEY_ALIAS"
          test -n "$ANDROID_RELEASE_KEY_PASSWORD"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/local-agent-plaza-release.jks"
          echo "ANDROID_RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/local-agent-plaza-release.jks" >> "$GITHUB_ENV"
      - name: Build
        run: ./gradlew assembleRelease
      - name: Verify APK signing and version
        run: |
          "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/apksigner" verify --print-certs app/build/outputs/apk/release/app-release.apk
          "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/aapt" dump badging app/build/outputs/apk/release/app-release.apk | head -n 1
      - name: Rename APK to channel-aware filename
        id: rename
        run: |
          OUT="app/build/outputs/apk/release/app-release.apk"
          NEW="local-agent-plaza-${{ steps.channel.outputs.vname }}.apk"
          cp "$OUT" "$NEW"
          sha256sum "$NEW" | awk '{print $1}' > "$NEW.sha256"
          echo "apk_name=$NEW" >> "$GITHUB_OUTPUT"
          echo "sha256_name=$NEW.sha256" >> "$GITHUB_OUTPUT"
      - name: Upload APK artifact (短保留：3 天，节省云端存储)
        uses: actions/upload-artifact@v4
        with:
          name: local-agent-plaza-${{ steps.channel.outputs.channel }}-${{ github.run_number }}
          path: |
            Android/src/${{ steps.rename.outputs.apk_name }}
            Android/src/${{ steps.rename.outputs.sha256_name }}
          if-no-files-found: error
          retention-days: 3
      - name: Publish APK to GitHub Release (仅当 tag 触发)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.channel.outputs.prerelease }}
          files: |
            Android/src/${{ steps.rename.outputs.apk_name }}
            Android/src/${{ steps.rename.outputs.sha256_name }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
